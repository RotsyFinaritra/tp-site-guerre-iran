<VirtualHost *:80>
    ServerAdmin webmaster@localhost
    DocumentRoot /var/www/html/public

    <Directory /var/www/html/public>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined

    # ── Compression gzip ───────────────────────────────────────────────────
    # Active gzip via mod_deflate pour réduire le poids HTML/CSS/JS.
    <IfModule mod_deflate.c>
        AddOutputFilterByType DEFLATE \
            text/plain \
            text/html \
            text/xml \
            text/css \
            text/javascript \
            application/javascript \
            application/x-javascript \
            application/json \
            application/xml \
            application/xhtml+xml \
            image/svg+xml

        # Ne pas recomprimer les formats déjà compressés.
        SetEnvIfNoCase Request_URI \.(?:gif|jpe?g|png|webp|avif|ico|zip|gz|bz2|rar|7z|mp4|mp3|woff2?)$ no-gzip dont-vary

        # Compat / proxies.
        <IfModule mod_headers.c>
            Header append Vary Accept-Encoding env=!dont-vary
        </IfModule>
    </IfModule>

    # ── Cache navigateur (assets statiques) ───────────────────────────────
    <IfModule mod_expires.c>
        ExpiresActive On
        # Par défaut, ne pas forcer de cache long sur HTML.
        ExpiresDefault "access plus 0 seconds"

        ExpiresByType text/css "access plus 1 year"
        ExpiresByType application/javascript "access plus 1 year"
        ExpiresByType text/javascript "access plus 1 year"
        ExpiresByType image/svg+xml "access plus 1 year"
        ExpiresByType image/vnd.microsoft.icon "access plus 1 year"
        ExpiresByType image/x-icon "access plus 1 year"
        ExpiresByType image/png "access plus 1 year"
        ExpiresByType image/jpeg "access plus 1 year"
        ExpiresByType image/webp "access plus 1 year"
        ExpiresByType image/avif "access plus 1 year"
        ExpiresByType font/woff2 "access plus 1 year"
        ExpiresByType font/woff "access plus 1 year"
    </IfModule>

    <IfModule mod_headers.c>
        # Cache long uniquement pour les chemins statiques.
        <LocationMatch "^/(assets|uploads|admin/assets)/">
            Header set Cache-Control "public, max-age=31536000, immutable"
        </LocationMatch>

        # Cache long pour favicon (chargé très tôt par le navigateur)
        <LocationMatch "^/favicon\.(?:ico|svg)$">
            Header set Cache-Control "public, max-age=31536000, immutable"
        </LocationMatch>

        # Pas de cache agressif sur les pages dynamiques.
        <LocationMatch "\.(?:php)$">
            Header set Cache-Control "no-store"
        </LocationMatch>
    </IfModule>
</VirtualHost>