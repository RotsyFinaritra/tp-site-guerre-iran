<VirtualHost *:80>
    ServerAdmin webmaster@localhost
    DocumentRoot /var/www/html/public

    <Directory /var/www/html/public>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Compression (HTML/CSS/JS/JSON/SVG)
    <IfModule mod_deflate.c>
        DeflateCompressionLevel 6
        AddOutputFilterByType DEFLATE \
            text/html text/plain text/css \
            text/javascript application/javascript application/x-javascript \
            application/json application/xml \
            image/svg+xml
    </IfModule>

    # Cache navigateur: court pour HTML/PHP, plus long pour assets statiques.
    <IfModule mod_headers.c>
        <FilesMatch "\.(php)$">
            Header set Cache-Control "no-cache"
        </FilesMatch>

        <FilesMatch "\.(css|js|png|jpg|jpeg|webp|gif|svg|ico|woff2?|ttf)$">
            Header set Cache-Control "public, max-age=604800"
        </FilesMatch>
    </IfModule>

    <IfModule mod_expires.c>
        ExpiresActive On
        ExpiresByType text/css "access plus 7 days"
        ExpiresByType application/javascript "access plus 7 days"
        ExpiresByType text/javascript "access plus 7 days"
        ExpiresByType image/webp "access plus 30 days"
        ExpiresByType image/png "access plus 30 days"
        ExpiresByType image/jpeg "access plus 30 days"
        ExpiresByType image/gif "access plus 30 days"
        ExpiresByType image/svg+xml "access plus 30 days"
        ExpiresByType font/woff2 "access plus 30 days"
        ExpiresByType font/woff "access plus 30 days"
    </IfModule>

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>